spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  application:
    name: nucosmos-pos-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nucosmos_pos}
    username: ${DB_USERNAME:nucosmos}
    password: ${DB_PASSWORD:nucosmos_dev_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  firebase:
    admin-credentials-path: ${FIREBASE_ADMIN_CREDENTIALS_PATH:}
    web:
      api-key: ${VITE_FIREBASE_API_KEY:}
      auth-domain: ${VITE_FIREBASE_AUTH_DOMAIN:}
      project-id: ${VITE_FIREBASE_PROJECT_ID:}
      storage-bucket: ${VITE_FIREBASE_STORAGE_BUCKET:}
      messaging-sender-id: ${VITE_FIREBASE_MESSAGING_SENDER_ID:}
      app-id: ${VITE_FIREBASE_APP_ID:}
      measurement-id: ${VITE_FIREBASE_MEASUREMENT_ID:}
  redeem:
    public-base-url: ${PUBLIC_WEB_BASE_URL:https://nucosmos.io}
  security:
    jwt:
      secret-base64: ${JWT_SECRET_BASE64:bmV2ZXItc2hpcC10aGlzLWRlZmF1bHQtc2VjcmV0LWluLXByb2QtdXNlLWFuLWVudi12YXI=}
      access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:480}
