<VirtualHost *:80>
    ServerName nucosmos.io
    ServerAlias www.nucosmos.io

    ProxyPreserveHost On
    ProxyRequests Off

    # Keep ACME challenges available for future certificate issuance.
    ProxyPass /.well-known !

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog /var/log/httpd/nucosmos.io-error.log
    CustomLog /var/log/httpd/nucosmos.io-access.log combined
</VirtualHost>
