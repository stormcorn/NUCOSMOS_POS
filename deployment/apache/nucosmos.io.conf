<VirtualHost *:80>
    ServerName nucosmos.io
    ServerAlias www.nucosmos.io

    # Keep ACME challenges available for future certificate issuance.
    ProxyPass /.well-known !

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName nucosmos.io
    ServerAlias www.nucosmos.io

    DocumentRoot /var/www/nucosmos-cover
    DirectoryIndex index.html

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/nucosmos/nucosmos.io.crt
    SSLCertificateKeyFile /etc/pki/tls/nucosmos/nucosmos.io.key
    SSLCertificateChainFile /etc/pki/tls/nucosmos/nucosmos.io.ca-bundle

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass /.well-known !

    RedirectMatch 302 ^/erp$ /erp/

    <Directory /var/www/nucosmos-cover>
        Require all granted
    </Directory>

    ProxyPass /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    ProxyPass /actuator/ http://127.0.0.1:8080/actuator/
    ProxyPassReverse /actuator/ http://127.0.0.1:8080/actuator/

    ProxyPass /erp/ http://127.0.0.1:8080/
    ProxyPassReverse /erp/ http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
</VirtualHost>
