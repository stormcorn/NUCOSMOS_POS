services:
  postgres:
    image: postgres:16-alpine
    container_name: nucosmos-pos-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: nucosmos-pos-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES}
      SERVER_PORT: 8081
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      FIREBASE_ADMIN_CREDENTIALS_PATH: /run/secrets/firebase-admin.json
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx384m -XX:MaxMetaspaceSize=192m}
    volumes:
      - ${FIREBASE_ADMIN_CREDENTIALS_PATH}:/run/secrets/firebase-admin.json:ro
    ports:
      - "127.0.0.1:${BACKEND_PUBLIC_PORT:-8081}:8081"

  admin-web:
    build:
      context: ..
      dockerfile: Dockerfile.admin-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_BASE: ${VITE_BASE:-/}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
    container_name: nucosmos-pos-admin-web-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_WEB_PORT:-8080}:80"

volumes:
  postgres_data:
