services:
  postgres:
    image: postgres:16-alpine
    container_name: nucosmos-pos-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: nucosmos-pos-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES}
      SERVER_PORT: 8081
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}

  admin-web:
    build:
      context: ..
      dockerfile: Dockerfile.admin-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: nucosmos-pos-admin-web-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_WEB_PORT:-8080}:80"

volumes:
  postgres_data:
