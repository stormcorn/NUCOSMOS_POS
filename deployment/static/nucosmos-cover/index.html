<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUCOSMOS</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #04020e;
        color: #f3efff;
        font-family: "Noto Sans TC", sans-serif;
      }

      .cover {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px 40px;
      }

      .cover::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 55% 55% at 30% 35%, rgba(80, 20, 180, 0.45) 0%, transparent 65%),
          radial-gradient(ellipse 40% 50% at 75% 65%, rgba(20, 60, 180, 0.25) 0%, transparent 65%);
      }

      .cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(90, 50, 200, 0.13) 1px, transparent 1px),
          linear-gradient(90deg, rgba(90, 50, 200, 0.13) 1px, transparent 1px);
        background-size: 55px 55px;
      }

      .orbit {
        position: absolute;
        border-radius: 50%;
        border: 1px solid;
        top: 50%;
        left: 50%;
        transform-origin: 0 0;
      }

      .o1 {
        width: 520px;
        height: 200px;
        margin: -100px -260px;
        border-color: rgba(100, 200, 255, 0.18);
        transform: rotate(-15deg);
        animation: spin1 28s linear infinite;
      }

      .o2 {
        width: 680px;
        height: 280px;
        margin: -140px -340px;
        border-color: rgba(130, 80, 255, 0.14);
        transform: rotate(8deg);
        animation: spin2 42s linear infinite reverse;
      }

      .o3 {
        width: 400px;
        height: 400px;
        margin: -200px -200px;
        border-color: rgba(60, 120, 255, 0.12);
        animation: spin3 60s linear infinite;
      }

      @keyframes spin1 {
        from {
          transform: rotate(-15deg);
        }
        to {
          transform: rotate(345deg);
        }
      }

      @keyframes spin2 {
        from {
          transform: rotate(8deg);
        }
        to {
          transform: rotate(-352deg);
        }
      }

      @keyframes spin3 {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .stars {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
      }

      .badge {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 68px;
        height: 68px;
        background: rgba(90, 40, 210, 0.85);
        border: 1.5px solid rgba(140, 90, 255, 0.7);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        clip-path: polygon(8% 0%, 92% 0%, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0% 92%, 0% 8%);
        z-index: 1;
      }

      .badge span {
        font-family: "Orbitron", monospace;
        font-size: 10px;
        font-weight: 700;
        color: #e8e0ff;
        line-height: 1.4;
        text-align: center;
        letter-spacing: 0.05em;
      }

      .tagline {
        font-family: "Rajdhani", sans-serif;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.32em;
        color: #00e5ff;
        text-transform: uppercase;
        margin-bottom: 28px;
        z-index: 1;
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        text-align: center;
      }

      .tagline i {
        color: rgba(0, 229, 255, 0.35);
        font-style: normal;
      }

      .logo {
        font-family: "Orbitron", monospace;
        font-size: clamp(48px, 9vw, 78px);
        font-weight: 900;
        letter-spacing: 0.07em;
        line-height: 1;
        z-index: 1;
        background: linear-gradient(130deg, #c8b8ff 0%, #9b5aff 38%, #00cfff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 22px rgba(100, 40, 220, 0.65)) drop-shadow(0 0 55px rgba(0, 200, 255, 0.22));
      }

      .logo .slash {
        background: linear-gradient(130deg, #00e5ff, #7b40ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .sub {
        font-size: 17px;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: rgba(220, 210, 255, 0.65);
        margin-top: 12px;
        z-index: 1;
        text-align: center;
      }

      .div {
        width: 140px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #00e5ff 40%, #9b4dff, transparent);
        margin: 28px 0;
        z-index: 1;
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.35);
      }

      .addr {
        text-align: center;
        z-index: 1;
        font-family: "Rajdhani", sans-serif;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: rgba(200, 190, 240, 0.45);
        line-height: 2.2;
      }

      .addr .zh {
        display: block;
        font-family: "Noto Sans TC", sans-serif;
        font-size: 11.5px;
        letter-spacing: 0.18em;
        color: rgba(200, 190, 240, 0.42);
        margin-bottom: 4px;
      }

      .actions {
        margin-top: 30px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        z-index: 1;
        width: min(100%, 420px);
      }

      .action-link {
        text-decoration: none;
        flex: 1 1 180px;
        padding: 14px 18px;
        border-radius: 999px;
        border: 1px solid rgba(0, 229, 255, 0.35);
        color: #f3efff;
        background: rgba(7, 12, 28, 0.72);
        box-shadow: 0 0 22px rgba(0, 229, 255, 0.12);
        text-align: center;
        font-family: "Rajdhani", sans-serif;
        letter-spacing: 0.14em;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .action-link:hover {
        transform: translateY(-2px);
        border-color: rgba(0, 229, 255, 0.75);
        box-shadow: 0 0 28px rgba(0, 229, 255, 0.22);
      }

      .social {
        position: absolute;
        bottom: 28px;
        left: 40px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 1;
      }

      .slink {
        font-family: "Rajdhani", sans-serif;
        font-size: 9.5px;
        letter-spacing: 0.28em;
        color: rgba(180, 170, 220, 0.5);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .slink::before {
        content: "";
        display: block;
        width: 18px;
        height: 1px;
        background: #00e5ff;
        opacity: 0.6;
      }

      .scan {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.04) 2px, rgba(0, 0, 0, 0.04) 4px);
      }

      @media (max-width: 820px) {
        .cover {
          min-height: 100svh;
          padding-inline: 18px;
        }

        .tagline {
          font-size: 9px;
          gap: 8px;
          letter-spacing: 0.18em;
        }

        .sub {
          font-size: 14px;
          letter-spacing: 0.12em;
        }

        .actions {
          width: 100%;
          gap: 12px;
        }

        .action-link {
          width: 100%;
        }

        .social {
          position: static;
          margin-top: 28px;
          align-items: center;
        }

        .slink::before {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="cover">
      <div class="stars" id="stars"></div>
      <div class="orbit o1"></div>
      <div class="orbit o2"></div>
      <div class="orbit o3"></div>
      <div class="badge"><span>NU<br />COS<br />MOS</span></div>
      <div class="tagline">TEA SYSTEM <i>|</i> SWEET <i>|</i> ORBITS <i>|</i> GIFTS <i>|</i> DAILY SUPPLY</div>
      <div class="logo">NUC<span class="slash">O</span>SM<span class="slash">O</span>S</div>
      <div class="sub">宇宙茶飲・甜點・日常補給</div>
      <div class="div"></div>
      <div class="addr">
        <span class="zh">台中市中區台灣大道一段 246 號</span>
        No. 246, Sec. 1, Taiwan Blvd., Central Dist., Taichung City 400
      </div>
      <div class="actions">
        <a class="action-link" href="https://www.facebook.com/share/1GtNyZkhHp/" target="_blank" rel="noreferrer">FACEBOOK</a>
        <a class="action-link" href="https://www.instagram.com/nucosmos.246?igsh=eHZvd3M1anYzdGxq" target="_blank" rel="noreferrer">INSTAGRAM</a>
      </div>
      <div class="social">
        <div class="slink">@NUCOSMOS.246</div>
        <div class="slink">FACEBOOK / INSTAGRAM</div>
      </div>
      <div class="scan"></div>
    </div>
    <script>
      const stars = document.getElementById("stars");
      for (let i = 0; i < 90; i += 1) {
        const el = document.createElement("div");
        const size = Math.random() * 1.8 + 0.4;
        el.className = "star";
        el.style.cssText = `width:${size}px;height:${size}px;top:${Math.random() * 100}%;left:${Math.random() * 100}%;opacity:${Math.random() * 0.8 + 0.2}`;
        stars.appendChild(el);
      }
    </script>
  </body>
</html>
